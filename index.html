    function displayProducts(){
        products.forEach(product => {
        productsList.innerHTML +=
            `
        <div class="card">
            <img src="${product.image}">
            <h3>${$product.name}</h3>
            <p>${product.price}</p>
            <button onclick="addtocart(${product.id})">Buy Now</button>
        </div>
       `
        });
    }

    displayProducts();
