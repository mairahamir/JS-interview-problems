<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>shopping cart system</h2>
    <div id="products"></div>

    <h3>cart</h3>
    <div id="cart"></div>

    <h2>Total: <span id="total">0</span></h2>
</body>
<script>
    var product = [
    {id:1 , name : "cpu" , price:34000},
    {id:2, name:"speaker", price:1000},
    {id:3, name:"mouse", price:300},
    {id:4, name:"keyboard", price:1500},
    {id:5, name:"usb", price:700},
    {id:6, name:"charger", price:300},
    {id:7, name:"mobile", price:100000},
    {id:8, name:"airpods", price:5000},
    {id:9, name:"cpu", price:50000}
    ];

    var cart = [];

    // show products
    
    function showproduct(){
        var productlist = document.getElementById("products");
        productlist.innerHTML = "";

        product.forEach(prod => {
            productlist.innerHTML += `
             
            <div class = "card">
             <p>${prod.name}  Rs: ${prod.price}</p> 
             <button class="btn" onclick="addtocart()">${prod.id}</button>
            </div>
            `
        });
    }

   function addtocart(id){
      
    var item = cart.find(p => p.product.id === id)
    if(item){
        item.quantity++;
    }else{
        var pro = product.find(P => p.id === id)
        cart.push({product:pro , quantity:1})
    }

    showcart();
   }

   function showcart(){
    var cart = document.getElementById("cart");

    cart.innerHTML = "";
    var total = document.getElementById("total");
    var total = 0;

    cart.forEach((item) => {
        
    total += item.product.price * item.quantity;

    cart.innerHTML += `
        <div class="cart-item">
        <p>${item.product.name} --  Rs : ${item.product.price}</p>
         <button class="btn" onclick="increase(${item.product.id})">+</button>
                <span>${item.quantity}</span>
         <button class="btn" onclick="decrease(${item.product.id})">-</button>

        </div>

        
        `

    });


    showcart();
    showproduct();

    
     

    
    
    
   }





</script>
</html>
